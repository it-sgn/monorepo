syntax = "proto3";

package overtime.service.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "openapiv3/annotations.proto";

option go_package = "api/overtime/v1;v1";

option (openapi.v3.document) = {
    info: {
        title: "Overtime service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8000",
            email: "fuadhasan2@gmail.com"
        },
        description: "Overtime service";
    },
};

service Overtime {
  rpc RequestOvertime (RequestOvertimeRequest) returns (RequestOvertimeResponse) {
    option (google.api.http) = {
      post: "/v1/overtimes"
      body: "*"
    };
  }
  rpc ApproveOvertime (ApproveOvertimeRequest) returns (ApproveOvertimeResponse) {
    option (google.api.http) = {
      patch: "/v1/overtimes/{id}:approve"
      body: "*"
    };
  }
  rpc RejectOvertime (RejectOvertimeRequest) returns (RejectOvertimeResponse) {
    option (google.api.http) = {
      patch: "/v1/overtimes/{id}:reject"
      body: "*"
    };
  }
  rpc GetOvertimeID (GetOvertimeIDRequest) returns (GetOvertimeIDResponse) {
    option (google.api.http) = {
      get: "/v1/overtimes/{id}"
    };
  }
  rpc ListOvertime (ListOvertimeRequest) returns (ListOvertimeResponse) {
    option (google.api.http) = {
      get: "/v1/overtimes"
    };
  }
}


enum OvertimeStatus {
  OVERTIME_STATUS_UNSPECIFIED = 0;
  OVERTIME_STATUS_PENDING = 1;
  OVERTIME_STATUS_APPROVED = 2;
  OVERTIME_STATUS_REJECTED = 3;
  OVERTIME_STATUS_CANCELLED = 4;
}

message OvertimeData {
  string id = 1;
  string karyacode = 2;
  google.protobuf.Timestamp overtime_start_time = 3;
  google.protobuf.Timestamp overtime_end_time = 4;
  int32 duration_minutes = 5;
  string created_by = 6;
  string approved_by = 7;
  OvertimeStatus status = 8;
  string notes = 9;
  
}

message RequestOvertimeRequest {
  string karyacode = 1;
  google.protobuf.Timestamp overtime_start_time = 2;
  google.protobuf.Timestamp overtime_end_time = 3;
  string notes = 4;
}

message RequestOvertimeResponse {
  OvertimeData overtime = 1;
}

message ApproveOvertimeRequest {
  string id = 1;
  string approved_by = 2;
}

message ApproveOvertimeResponse {
  OvertimeData overtime = 1;
}

message RejectOvertimeRequest {
  string id = 1;
  string rejected_by = 2;
  string rejection_notes = 3;
}

message RejectOvertimeResponse {
  OvertimeData overtime = 1;
}

message GetOvertimeIDRequest {
  string id = 1;
}

message GetOvertimeIDResponse {
  OvertimeData overtime = 1;
}

message ListOvertimeRequest {
  uint32 pn = 1;
  uint32 pSize = 2;
  // string karyacode = 1;
  // OvertimeStatus status = 2;
  // string start_date = 3; // YYYY-MM-DD
  // string end_date = 4;   // YYYY-MM-DD
  // int32 page_size = 5;
  // string page_token = 6;
}

message ListOvertimeResponse {
  int32 total = 1;
  repeated OvertimeData overtimes = 2;
  // string next_page_token = 2;
  // int32 total_size = 3;
}
