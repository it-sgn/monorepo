syntax = "proto3";

package shift.service.v1;

import "google/api/annotations.proto";
import "openapiv3/annotations.proto";

option go_package = "api/shift/v1;v1";
option (openapi.v3.document) = {
    info: {
        title: "Employers service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8000",
            email: "fuadhasan2@gmail.com"
        },
        description: "Employers service";
    },
};

service Shift {
  rpc CreateShift (CreateShiftRequest) returns (CreateShiftResponse) {
    option (google.api.http) = {
      post: "/v1/shifts"
      body: "*"
    };
  }
  rpc GetShiftID (GetShiftIDRequest) returns (GetShiftIDResponse) {
    option (google.api.http) = {
      get: "/v1/shifts/{id}"
    };
  }
  rpc ListShift (ListShiftRequest) returns (ListShiftResponse) {
    option (google.api.http) = {
      get: "/v1/shifts"
    };
  }
  rpc UpdateShift (UpdateShiftRequest) returns (UpdateShiftResponse) {
    option (google.api.http) = {
      put: "/v1/shifts/{id}"
      body: "*"
    };
  }
  rpc DeleteShift (DeleteShiftRequest) returns (DeleteShiftResponse) {
    option (google.api.http) = {
      delete: "/v1/shifts/{id}"
    };
  }
}
message ShiftData {
  int64 id = 1;
  string name = 2;
  string start_time = 3; // HH:MM (e.g., "08:00")
  string end_time = 4;   // HH:MM (e.g., "17:00")
  int32 break_duration_minutes = 5;
  string created_by = 6;
  string updated_by = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreateShiftRequest {
  string name = 1;
  string start_time = 2;
  string end_time = 3;
  int32 break_duration_minutes = 4;
  string created_by = 6;
}

message CreateShiftResponse {
  ShiftData shift = 1;
}

message GetShiftIDRequest {
  int64 id = 1;
}

message GetShiftIDResponse {
  ShiftData shift = 1;
}

message ListShiftRequest {
  uint32 pn = 1;
  uint32 pSize = 2;
}

message ListShiftResponse {
  int32 total = 1;
  repeated ShiftData shifts = 2;
  // string next_page_token = 2;
  // int32 Total = 3;
}

message UpdateShiftRequest {
  int64 id = 1;
  string name = 2;
  string start_time = 3;
  string end_time = 4;
  int32 break_duration_minutes = 5;
  string updated_by = 6;
  string updated_at = 7;
}

message UpdateShiftResponse {
  ShiftData shift = 1;
}

message DeleteShiftRequest {
  int64 id = 1;
}

message DeleteShiftResponse {
  bool success = 1;
}
