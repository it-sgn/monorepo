syntax = "proto3";

package attendace.service.v1;

// import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "api/attendace/service/v1;v1";

service AttendanceService {
  rpc ReceiveAttendanceLog (AttendanceLogRequest) returns (google.protobuf.Empty);
}

message AttendanceLogRequest {
  int64 user_id = 1;
  string device_ip = 2;
  string timestamp = 3; // ISO8601 format
  int32 status = 4; // 0 = clock_in, 1 = clock_out
}

