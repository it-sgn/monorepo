message DepartData {
  string depart_code = 1;
  string depart_name = 2;
}
message EmployerItem {
	string karya_code = 1;
	string karya_name = 2;
  string department = 3;
  string kode_perusahaan = 4;
  string kode_cabang = 5;
}

message GetEmployersByFilterRequest {
  repeated string karya_codes = 1 [json_name = "karya_codes"];
}
message GetEmployersByFilterResponse {
  repeated EmployerItem result = 1;
}

message GetEmployersFilterDepartCodeRequest{
    string departcode = 1;
}

message GetEmployersFilterDepartCodeResponse {
  repeated EmployerItem result = 1;
}
