syntax = "proto3";

package employers.service.v1;

import "google/api/annotations.proto";
import "openapiv3/annotations.proto";

option go_package = "api/employers/service/v1;v1";
option (openapi.v3.document) = {
    info: {
        title: "Employers service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8000",
            email: "fuadhasan2@gmail.com"
        },
        description: "Employers service";
    },
};

service Employers {
	rpc CreateEmployers (CreateEmployersRequest) returns (CreateEmployersResponse){
		option (google.api.http) = {
		post: "/v1/employers"
		body: "*"
	  };
	};
	rpc UpdateEmployers (UpdateEmployersRequest) returns (UpdateEmployersResponse){
	  option (google.api.http) = {
      put: "/v1/employers/{id}"
      body: "*"
     };
	};
	rpc DeleteEmployers (DeleteEmployersRequest) returns (DeleteEmployersResponse){
		option (google.api.http) = {
        delete: "/v1/employers/{id}"
      };
	};
	rpc GetEmployersID (GetEmployersIDRequest) returns (GetEmployersIDResponse){
		option (google.api.http) = {
		get: "/v1/employers/{id}"
	 };
	};
  rpc GetEmployersKode (GetEmployersKodeRequest) returns (GetEmployersKodeResponse){
		option (google.api.http) = {
		get: "/v1/employers/{karya_code}"
	 };
	};
  rpc GetEmployersDetail (GetEmployerDetailRequest) returns (GetEmployersDetailResponse){
		option (google.api.http) = {
		get: "/v1/employer/{id}"
	 };
	};
	rpc ListEmployers (ListEmployersRequest) returns (ListEmployersResponse){
    option (google.api.http) = {
		get: "/v1/employer/list"
	 };
  };
  rpc ListEmployersNext (ListEmployersTokenReq) returns (ListEmployersResponseNextToken){
    option (google.api.http) = {
		get: "/v1/employers/listnext"
	 };
  };

  rpc GetEmployersByFilter(GetEmployersByFilterRequest) returns (GetEmployersByFilterResponse){
  option (google.api.http) = {
      get: "/v1/employers/filter"
    };
  };
  rpc GetEmployersFilterDepartCode(GetEmployersFilterDepartCodeRequest) returns (GetEmployersFilterDepartCodeResponse){
  option (google.api.http) = {
      get: "/v1/employers/depart"
    };
  };  
  rpc GetPerusahaan(GetPerusahaanRequest)returns (GetPerusahaanResponse){};
  rpc GetCabang(GetCabangRequest)returns (GetCabangResponse){};
// rpc BulkUpdateDepartment(BulkUpdateDepartmentRequest) returns (BulkUpdateDepartmentResponse) {
//   option (google.api.http) = {
//     put: "/v1/employers/bulk-update-department"
//     body: "*"
//   };
// }

}

// Definisi untuk objek kode_finger
message Finger {
  string id = 1;
  string fingercode = 2;
  string finger0 = 3;
  string finger1 = 4;
  string finger2 = 5;
  string finger3 = 6;
  string finger4 = 7;
  string finger5 = 8;
  string finger6 = 9;
  string finger7 = 10;
  string finger8 = 11;
  string finger9 = 12;
  string created_at = 13;
  string updated_at = 14;
}

// Definisi untuk objek department
message Department {
  string departcode = 1;
  string departname = 2;
}

message EmployersRecord {
  int64 id = 1;
  string nosap = 2;
  string nip = 3;
  string karya_code = 4;
  string karya_name = 5;
  string disp_name = 6;
  string pass_mesin = 7;
  string rfid_card = 8;
  repeated Finger finger = 9;
  repeated Department department = 10;
  int32 status = 11;
  string kode_perusahaan = 12;
  string kode_cabang = 14;
  string created_at = 15;
  string updated_at = 16;
}

