message GetPerusahaanRequest{
  string departcode =1;
}

  
message GetCabangRequest{
  string departcode =1;
}

message Perusahaan {
  string kode_perusahaan = 1;
  string nama_perusahaan = 2;
  string kode_cabang = 3;
  string cabang = 4;
  string karya_code = 5; // tambahkan ini
}
message Cabang {
  string kode_perusahaan = 1;
  string nama_perusahaan = 2;
  string kode_cabang = 3;
  string cabang = 4;
}
message GetCabangResponse{
  repeated Cabang cabang = 1;
}
message GetPerusahaanResponse{
  repeated Perusahaan perusahaan = 1;
}


message ListEmployersRequest {
  uint32 pn = 1;
  uint32 pSize = 2;
}
message ListEmployersResponse {
  int32 total = 1;
  repeated EmployersRecord employers = 2;
}

message ListEmployersTokenReq {
  int32 page_size = 1;
  string page_token = 2;
}
message ListEmployersResponseNextToken {
    // repeated EmployersRecord results = 1;
    repeated EmployersRecord employers = 1;
    string next_token = 2;
}

 
