syntax = "proto3";

package log_downloader.v1;

// import "google/protobuf/timestamp.proto";
//import "google/api/annotations.proto"; // For HTTP mapping
import "openapiv3/annotations.proto";

option go_package = "api/log_downloader/v1;v1";

option (openapi.v3.document) = {
    info: {
        title: "Biometric service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8001",
            email: "fuadhasan2@gmail.com"
        },
        description: "Biometric service";
    },
};
service CronJobService {
  rpc CreateCronJob (CreateCronJobRequest) returns (CreateCronJobReply);
  rpc UpdateCronJob (UpdateCronJobRequest) returns (UpdateCronJobReply);
  rpc DeleteCronJob (DeleteCronJobRequest) returns (DeleteCronJobReply);
  rpc GetCronJob (GetCronJobRequest) returns (GetCronJobReply);
  rpc ListCronJob (ListCronJobRequest) returns (ListCronJobReply);
}

message CronJob {
  int64 id = 1;
  string name = 2;
  string spec = 3; // Cron specification (e.g., "0 * * * *")
  string command = 4; // Command to execute
  bool enabled = 5;
  string last_run_at = 6;
  string next_run_at = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreateCronJobRequest {
  string name = 1;
  string spec = 2;
  string command = 3;
  bool enabled = 4;
}

message CreateCronJobReply {
  CronJob cron_job = 1;
}

message UpdateCronJobRequest {
  int64 id = 1;
  string name = 2;
  string spec = 3;
  string command = 4;
  bool enabled = 5;
}

message UpdateCronJobReply {
  CronJob cron_job = 1;
}

message DeleteCronJobRequest {
  int64 id = 1;
}

message DeleteCronJobReply {}

message GetCronJobRequest {
  int64 id = 1;
}

message GetCronJobReply {
  CronJob cron_job = 1;
}

message ListCronJobRequest {
  int64 page_size = 1;
  int64 page_token = 2;
}

message ListCronJobReply {
  repeated CronJob cron_jobs = 1;
  int64 total_count = 2;
}
