syntax = "proto3";

package log_downloader.service.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto"; // For HTTP mapping
import "openapiv3/annotations.proto";

option go_package = "api/log_downloader/v1;v1";


option (openapi.v3.document) = {
    info: {
        title: "Log Downloader service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8001",
            email: "fuadhasan2@gmail.com"
        },
        description: "Log Downloader service";
    },
};

service Attendance {
  rpc GetDailySummary(GetDailySummaryRequest) returns (GetDailySummaryResponse){
    option (google.api.http) = {
      get: "/v1/attendance/{start_date}/{end_date}"
    };
  };
  rpc GetDailySummaryById(DailySummaryByIdRequest) returns (DailySummaryByIdResponse){
    option (google.api.http) = {
      get: "/v1/attendance/{user_id}"
    };
  }
  rpc ListAttendance (ListAttendanceRequest) returns (ListAttendanceResponse) {
    option (google.api.http) = {
      get: "/v1/attendance"
    };
  }
  // Add other operations like UpdateAttendanceStatus, etc. as needed
}
message AttendanceData {
  string id = 1; // Unique ID for attendance record
  string device_ip = 2;
  int32 user_id = 3;
  string att_date = 4;
  string att_log = 5;
  int32 status = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ListAttendanceRequest {
  int32 pn = 1;
  int32 pSize = 2;
}

message ListAttendanceResponse {
  int32 total = 1;
  repeated AttendanceData attendances = 2;
}
message GetDailySummaryRequest{
  string start_date = 1;
  string end_date = 2;
}
message GetDailySummaryResponse{
  int32 total = 1;
  repeated AttendanceData attendances = 2;
}
message DailySummaryByIdRequest{
  int32 user_id =1;

}
message DailySummaryByIdResponse{
  repeated AttendanceData attendances = 2;
}