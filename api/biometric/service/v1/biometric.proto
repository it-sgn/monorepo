syntax = "proto3";

// package employers.service;
package biometrics.service.v1;

import "google/api/annotations.proto";
import "openapiv3/annotations.proto";

option go_package = "api/biometrics/service/v1;v1";

option (openapi.v3.document) = {
    info: {
        title: "Biometric service",
        version: "0.0.1",
        contact: {
            name: "fuadhs",
            url: "http://localhost:8001",
            email: "fuadhasan2@gmail.com"
        },
        description: "Biometric service";
    },
};

service Biometric{
  rpc GetFingerByID(GetFingerByIDRequest) returns (GetFingerByIDResponse){
		option (google.api.http) = {
		get: "/v1/finger/{id}"
	 };
  }
  rpc GetFingerByKode(GetFingerByKodeRequest) returns (GetFingerByKodeResponse){
    option (google.api.http) = {
		get: "/v1/finger/{fingercode}"
	 };
  }
  rpc CreateFinger(CreateFingerRequest) returns (CreateFingerResponse){
    option (google.api.http)={
      post: "/v1/fingers"
      body: "*"
    };
  }
  rpc UpdateFinger(UpdateFingerRequest) returns (UpdateFingerResponse){
    option (google.api.http)={
      put: "/v1/fingers"
      body: "*"
    };
  }
  rpc DeleteFinger(DeleteFingerRequest) returns (DeleteFingerResponse){
    option (google.api.http) = {
      delete : "/v1/fingers/{id}"
    };
  }
}



message GetFingerByIDRequest{
  int64 id = 1;
}

message GetFingerByIDResponse{
  int64 id = 1;
  string fingercode = 2;
  string finger0 = 3;
  string finger1 = 4;
  string finger2 = 5;
  string finger3 = 6;
  string finger4 = 7;
  string finger5 = 8;
  string finger6 = 10;
  string finger7 = 11;
  string finger8 = 12;
  string finger9 = 13;
  string created_at = 14;
  string updated_at = 15;  
}

message GetFingerByKodeRequest{
  string fingercode = 1;
}
message GetFingerByKodeResponse{
  int64 id = 1;
  string fingercode = 2;
  string finger0 = 3;
  string finger1 = 4;
  string finger2 = 5;
  string finger3 = 6;
  string finger4 = 7;
  string finger5 = 8;
  string finger6 = 10;
  string finger7 = 11;
  string finger8 = 12;
  string finger9 = 13;
  string created_at = 14;
  string updated_at = 15;  
}

