syntax = "proto3";

package cronzk.service.internal.conf;

// option go_package = "mall-go/module/app/service/internal/conf;conf";
option go_package = "mall-go/module/cronzk/service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Trace trace = 3;
  Job job = 4;
}
message Trace {
    string endpoint = 1;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    google.protobuf.Duration read_timeout = 4;
    google.protobuf.Duration write_timeout = 5;
  }
  message Kafka {
      repeated string addrs = 1;
      string topic = 2;
      string username = 3;
      string password = 4;
      string group_id = 5;
      google.protobuf.Duration read_timeout = 6;
      google.protobuf.Duration write_timeout = 7;
  }
  Database database = 1;
  Redis redis = 2;
  Kafka kafka = 3; 
}

message Registry {
  message Consul {
    string address = 1;
    string scheme = 2;
  }
  Consul consul = 1;
}

message Devices {
  repeated string ip = 1;
}

message Job {
  message JobConfig {
    string name = 1;
    string schedule = 2;
    string input = 3;
    string output = 4;
  }
  repeated JobConfig jobs = 1;
}